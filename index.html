<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開志専門職大学</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ヘッダー -->
    <header>
        <h1>開志専門職大学</h1>

        <!-- メニューバー -->
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="business.html">事業創造学部</a></li>
                <li><a href="information.html">情報学部</a></li>
                <li><a href="anime_manga.html">アニメ・マンガ学部</a></li>
            </ul>
        </nav>
    </header>

    <!-- メイン -->
    <main>

        <!-- 大学紹介 -->
        <div class="introduction-div">
            <h2>大学紹介</h2>

            <p>
                開志専門職大学は、次世代のビジネスとテクノロジーを牽引するプロフェッショナルを育成する大学です。<br>豊富な長期企業内実習と実務家教員による徹底した実践教育を通して、未来を切り拓く創造力と確かな専門性を身につけることができます。
            </p>
        </div>

        <!-- ギャラリー -->
        <div class="gallery-div">
            <h2>ギャラリー</h2>

            <div class="gallery">

                <img src="images/shichikuyama_campus.jpg" alt="紫竹山キャンパス" width="500">
                <img src="images/furumachi_campus.jpg" alt="古町キャンパス" width="500">
                <img src="images/music_club.jpg" alt="音楽サークル" width="500">
                <img src="images/engineer_club.jpg" alt="エンジニアサークル" width="500">

            </div>
        </div>

        <!-- お問い合わせフォーム -->
        <div class="contact-div">

            <h2>お問い合わせ</h2>

            <form>

                <!-- フォームのグループ -->
                <fieldset>

                    <legend>お問い合わせフォーム</legend>

                    <table class="form-table">

                        <tr>
                            <td>名前</td>

                            <td>
                                <input type="text" required>
                            </td>
                        </tr>

                        <tr>
                            <td>メールアドレス</td>

                            <td>
                                <input type="email" required>
                            </td>
                        </tr>

                        <tr>
                            <td>電話番号</td>

                            <td>
                                <input type="tel">
                            </td>
                        </tr>

                        <tr>
                            <td>お問い合わせ内容</td>

                            <td>
                                <textarea rows="10" cols="37"></textarea>
                            </td>
                        </tr>

                    </table>

                </fieldset>

                <br>

                <button type="submit">送信</button>

            </form>

        </div>

    </main>

    <!-- フッター -->
    <footer>
        <p>&copy; 2026 開志専門職大学</p>
    </footer>

    <button id="topBtn">
        <img width="40" height="40" src="https://img.icons8.com/sf-black-filled/64/FFFFFF/collapse-arrow.png"
            alt="collapse-arrow" />
    </button>
    <script src="js/script.js"></script>

</body>

</html>
